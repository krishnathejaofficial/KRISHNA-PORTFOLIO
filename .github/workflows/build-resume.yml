name: Compile LaTeX Resume

on:
  push:
    paths:
      - 'resume.tex'
      - 'public/images/krishna teja profile.jpg'
  workflow_dispatch:

jobs:
  build_resume:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy profile image for LaTeX compilation
        run: cp "public/images/krishna teja profile.jpg" krishnateja.jpg

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          compiler: pdflatex

      - name: Move PDF to public directory
        run: mv resume.pdf public/resume.pdf

      - name: Commit compiled PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update compiled resume PDF"
          file_pattern: "public/resume.pdf"
